<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>caloriq</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:        #1C1B19;
    --surface:   #252420;
    --surface2:  #2E2C28;
    --border:    #3A3830;
    --text:      #EEEBE4;
    --muted:     #7A7670;
    --accent:    #C96442;
    --accent-lt: rgba(201,100,66,0.15);
    --green:     #4CAF82;
    --green-lt:  rgba(76,175,130,0.15);
    --amber:     #E09D4A;
    --amber-lt:  rgba(224,157,74,0.15);
    --red:       #E05C5C;
    --red-lt:    rgba(224,92,92,0.15);
    --radius:    14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 540px;
    margin: 0 auto;
  }

  /* ── Header ─────────────────────────── */
  header {
    padding: 18px 20px 12px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-left { display: flex; align-items: baseline; gap: 8px; }
  header h1 {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
    color: var(--text);
  }
  header span { font-size: 12px; color: var(--muted); }

  /* ── Input card ─────────────────────── */
  .input-card {
    margin: 0 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: visible;
    box-shadow: 0 2px 12px rgba(0,0,0,0.3);
    position: relative;
  }

  textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    padding: 14px 16px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    background: transparent;
    color: var(--text);
    min-height: 72px;
  }
  textarea::placeholder { color: var(--muted); }

  .input-actions {
    display: flex;
    align-items: center;
    padding: 8px 10px 10px;
    gap: 6px;
    border-top: 1px solid var(--border);
  }

  .icon-btn {
    width: 36px; height: 36px;
    border: none;
    background: var(--surface2);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .icon-btn:active { background: var(--border); color: var(--text); }
  .icon-btn.recording { background: var(--red-lt); color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .icon-btn svg { width: 17px; height: 17px; }
  #file-input { display: none; }

  .send-btn {
    margin-left: auto;
    width: 36px; height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: white;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; }
  .send-btn svg { width: 16px; height: 16px; }

  /* ── Quick suggestions ───────────────── */
  .suggestions-wrap {
    padding: 8px 16px 0;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .suggestions-wrap::-webkit-scrollbar { display: none; }
  .suggestions-row {
    display: flex;
    gap: 6px;
    padding-bottom: 2px;
    min-width: max-content;
  }
  .suggestion-chip {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 400;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .suggestion-chip:active { background: var(--surface2); color: var(--text); border-color: var(--accent); }
  .suggestion-chip .chip-cal { color: var(--accent); font-size: 11px; font-weight: 500; }

  /* ── Status pills row ───────────────── */
  .pills-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px 4px;
    flex-wrap: wrap;
  }
  .pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 500;
    line-height: 1;
    white-space: nowrap;
  }
  .pill .dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .pill.green  { background: var(--green-lt);  color: var(--green); }
  .pill.green .dot  { background: var(--green); }
  .pill.amber  { background: var(--amber-lt);  color: var(--amber); }
  .pill.amber .dot  { background: var(--amber); }
  .pill.red    { background: var(--red-lt);    color: var(--red); }
  .pill.red .dot    { background: var(--red); }
  .pill.neutral{ background: var(--surface);   color: var(--muted); }
  .pill.neutral .dot{ background: var(--border); }
  .pill { cursor: pointer; transition: opacity 0.15s; }
  .pill:active { opacity: 0.7; }

  /* ── Toast ──────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--surface2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13.5px;
    font-weight: 500;
    z-index: 200;
    transition: transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
    max-width: calc(100vw - 48px);
    text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { background: var(--green-lt); color: var(--green); border-color: var(--green); }
  #toast.error   { background: var(--red-lt);   color: var(--red);   border-color: var(--red); }

  /* ── Toggle + manual add row ─────────── */
  .controls-row {
    display: flex;
    align-items: center;
    padding: 14px 16px 8px;
    gap: 8px;
  }
  .toggle-group { display: flex; gap: 6px; }
  .toggle-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .toggle-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: var(--bg);
  }
  .manual-btn {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 6px 13px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .manual-btn:active { background: var(--surface2); color: var(--text); }
  .manual-btn svg { width: 13px; height: 13px; }

  /* ── Log list ───────────────────────── */
  .log-list {
    flex: 1;
    padding: 0 16px 100px;
    display: flex;
    flex-direction: column;
  }
  .day-group { margin-bottom: 20px; }
  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }
  .day-label {
    font-family: 'Lora', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
  }
  .day-totals { display: flex; gap: 6px; align-items: center; }
  .day-pill {
    font-size: 11px; font-weight: 500;
    padding: 3px 8px; border-radius: 10px;
  }
  .day-pill.green  { background: var(--green-lt); color: var(--green); }
  .day-pill.red    { background: var(--red-lt);   color: var(--red); }
  .day-pill.amber  { background: var(--amber-lt); color: var(--amber); }
  .day-pill.neutral{ background: var(--surface);  color: var(--muted); }

  .entry {
    display: flex;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--surface2);
    gap: 10px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .entry:last-child { border-bottom: none; }
  .entry:active { opacity: 0.6; }
  .entry-icon {
    width: 30px; height: 30px;
    background: var(--surface2);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; font-size: 14px; margin-top: 1px;
  }
  .entry-body { flex: 1; min-width: 0; }
  .entry-name {
    font-size: 14px; font-weight: 500; line-height: 1.3;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .entry-meta { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .entry-macros { text-align: right; flex-shrink: 0; }
  .entry-cal { font-size: 14px; font-weight: 500; color: var(--text); }
  .entry-prot { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .entry-relog {
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; align-self: center;
    width: 28px; height: 28px;
    border: 1px solid var(--border);
    border-radius: 50%;
    background: transparent;
    color: var(--muted);
    font-size: 18px; line-height: 1;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: background 0.15s, color 0.15s, border-color 0.15s;
  }
  .entry-relog:active { background: var(--accent-lt); color: var(--accent); border-color: var(--accent); }

  /* ── Modal (shared) ──────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.6);
    z-index: 50;
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-backdrop.open { opacity: 1; pointer-events: all; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px 36px;
    width: 100%; max-width: 540px;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    max-height: 90dvh; overflow-y: auto;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .modal h3 {
    font-family: 'Lora', serif;
    font-size: 17px; margin-bottom: 16px;
    color: var(--text);
  }
  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block; font-size: 11px; font-weight: 500;
    color: var(--muted); margin-bottom: 5px;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .field-group input {
    width: 100%; padding: 11px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--surface2);
    color: var(--text);
    outline: none;
  }
  .field-group input:focus { border-color: var(--accent); }

  .modal-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn {
    flex: 1; padding: 12px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.75; }
  .btn.primary  { background: var(--accent); color: white; }
  .btn.secondary{ background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn.danger   { background: var(--red-lt); color: var(--red); }

  /* ── Manual log modal extras ─────────── */
  .tab-row {
    display: flex;
    gap: 0;
    margin-bottom: 18px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 3px;
  }
  .tab-btn {
    flex: 1; padding: 7px;
    border: none; border-radius: 6px;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500;
    cursor: pointer;
    background: transparent;
    color: var(--muted);
    transition: all 0.15s;
  }
  .tab-btn.active { background: var(--surface); color: var(--text); box-shadow: 0 1px 4px rgba(0,0,0,0.3); }

  .loading-row {
    display: flex; align-items: center; gap: 8px;
    padding: 32px 0; color: var(--muted);
    font-size: 14px; justify-content: center;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .empty-state {
    text-align: center; padding: 48px 16px;
    color: var(--muted); font-size: 14px; line-height: 1.6;
  }
  .empty-state p:first-child {
    font-family: 'Lora', serif; font-style: italic;
    font-size: 16px; color: var(--text); margin-bottom: 6px;
  }

  /* photo chip */
  #photo-chip {
    align-items: center; gap: 5px;
    background: var(--accent-lt);
    border-radius: 8px; padding: 4px 8px;
    font-size: 12px; color: var(--accent);
  }
  #photo-chip button { border:none; background:none; cursor:pointer; color:var(--accent); font-size:14px; line-height:1; padding:0 0 0 2px; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>caloriq</h1>
    <span>food & weight log</span>
  </div>
</header>

<!-- Status pills -->
<div class="pills-row" id="pills-row">
  <div class="pill neutral"><span class="dot"></span><span>loading…</span></div>
</div>

<!-- Input card -->
<div class="input-card">
  <textarea id="text-input" placeholder="What did you eat? or log your weight…" rows="3"></textarea>
  <div class="input-actions">
    <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Attach photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>
    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">

    <button class="icon-btn" id="mic-btn" onclick="toggleSpeech()" title="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>

    <div id="photo-chip" style="display:none;">
      <span>📷</span>
      <span id="photo-name"></span>
      <button onclick="clearPhoto()">×</button>
    </div>

    <button class="send-btn" id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<!-- Quick suggestions -->
<div class="suggestions-wrap" id="suggestions-wrap" style="display:none;">
  <div class="suggestions-row" id="suggestions-row"></div>
</div>

<!-- Controls row: toggle + manual add -->
<div class="controls-row">
  <div class="toggle-group">
    <button class="toggle-btn active" id="toggle-food" onclick="setView('food')">Food</button>
    <button class="toggle-btn" id="toggle-weight" onclick="setView('weight')">Weight</button>
  </div>
  <button class="manual-btn" id="manual-btn" onclick="openManualModal()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
    </svg>
    Add manually
  </button>
</div>

<!-- Log list -->
<div class="log-list" id="log-list">
  <div class="loading-row"><div class="spinner"></div><span>Loading…</span></div>
</div>

<!-- Edit modal -->
<div class="modal-backdrop" id="edit-modal-backdrop" onclick="closeEditModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="edit-modal-title">Edit entry</h3>
    <div id="edit-modal-fields"></div>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteEntry()">Delete</button>
      <button class="btn secondary" onclick="closeEditModal()">Cancel</button>
      <button class="btn primary" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<!-- Manual add modal -->
<div class="modal-backdrop" id="manual-modal-backdrop" onclick="closeManualModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Add manually</h3>
    <div class="tab-row">
      <button class="tab-btn active" id="manual-tab-food" onclick="setManualTab('food')">Food</button>
      <button class="tab-btn" id="manual-tab-weight" onclick="setManualTab('weight')">Weight</button>
    </div>
    <div id="manual-fields"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeManualModal()">Cancel</button>
      <button class="btn primary" onclick="saveManual()">Add entry</button>
    </div>
  </div>
</div>

<!-- Targets edit modal -->
<div class="modal-backdrop" id="targets-modal-backdrop" onclick="closeTargetsModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Edit targets</h3>
    <div class="field-group"><label>Daily calories (kcal)</label><input id="tgt-cal" type="number" placeholder="1500"></div>
    <div class="field-group"><label>Daily protein (g)</label><input id="tgt-prot" type="number" placeholder="120"></div>
    <div class="field-group"><label>Starting weight (kg)</label><input id="tgt-wstart" type="number" step="0.1" placeholder="75.9"></div>
    <div class="field-group"><label>Starting date</label><input id="tgt-wstart-date" type="date"></div>
    <div class="field-group"><label>Target weight (kg)</label><input id="tgt-wtarget" type="number" step="0.1" placeholder="66"></div>
    <div class="field-group"><label>Target date</label><input id="tgt-wtarget-date" type="date"></div>
    <div class="modal-actions">
      <button class="btn secondary" onclick="closeTargetsModal()">Cancel</button>
      <button class="btn primary" onclick="saveTargets()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
const API_BASE = '/api';
const TZ = Intl.DateTimeFormat().resolvedOptions().timeZone;

function loadTargets() {
  const saved = JSON.parse(localStorage.getItem('caloriq_targets') || '{}');
  return {
    goals:        { calories: saved.calories ?? 1500, protein: saved.protein ?? 120 },
    weightStart:  { kg: saved.wStartKg ?? 75.9, date: saved.wStartDate ?? '2026-05-31' },
    weightTarget: { kg: saved.wTargetKg ?? 66,   date: saved.wTargetDate ?? '2026-08-29' },
  };
}
function saveTargetsToStorage(t) {
  localStorage.setItem('caloriq_targets', JSON.stringify({
    calories: t.goals.calories, protein: t.goals.protein,
    wStartKg: t.weightStart.kg, wStartDate: t.weightStart.date,
    wTargetKg: t.weightTarget.kg, wTargetDate: t.weightTarget.date,
  }));
}

let { goals: GOALS, weightStart: WEIGHT_START, weightTarget: WEIGHT_TARGET } = loadTargets();

let currentView = 'food';
let allFood = [];
let allWeight = [];
let pendingPhoto = null;
let speechRecognition = null;
let isRecording = false;
let editingEntry = null;
let editingTable = null;
let manualTab = 'food';

// ── Init ──────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', loadData);

async function loadData() {
  try {
    const [foodRes, weightRes] = await Promise.all([
      fetch(`${API_BASE}/log?type=food`),
      fetch(`${API_BASE}/log?type=weight`)
    ]);
    allFood   = (await foodRes.json()).data   || [];
    allWeight = (await weightRes.json()).data || [];
    renderPills();
    renderSuggestions();
    renderList();
  } catch(e) {
    document.getElementById('log-list').innerHTML = `<div class="empty-state"><p>Couldn't load</p><span>${e.message}</span></div>`;
  }
}

// ── Suggestions ───────────────────────────────────────────────────────────────
function buildFrequencyMap() {
  const map = {};
  allFood.forEach(e => {
    const key = e.item.toLowerCase().trim();
    if (!map[key]) map[key] = { item: e.item, calories: e.calories, protein: e.protein, count: 0 };
    map[key].count++;
  });
  return Object.values(map).sort((a, b) => b.count - a.count);
}

function renderSuggestions() {
  const freq = buildFrequencyMap().slice(0, 10);
  const wrap = document.getElementById('suggestions-wrap');
  const row  = document.getElementById('suggestions-row');
  if (!freq.length) { wrap.style.display = 'none'; return; }
  wrap.style.display = 'block';
  row.innerHTML = freq.map(f => `
    <button class="suggestion-chip" onclick="quickAdd(${JSON.stringify(f.item).replace(/"/g,'&quot;')}, ${f.calories}, ${f.protein})">
      ${escHtml(f.item)} <span class="chip-cal">${f.calories} kcal</span>
    </button>`).join('');
}

async function quickAdd(item, calories, protein) {
  const now = new Date().toISOString();
  try {
    const res = await fetch(`${API_BASE}/entry?table=food_log`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ item, calories, protein, logged_at: now })
    });
    // fallback: if direct insert not supported, use AI path
    if (!res.ok) throw new Error('direct');
    const json = await res.json();
    allFood = [json.data, ...allFood];
    renderPills(); renderSuggestions(); renderList();
    showToast(`✓ ${item} · ${calories} kcal`, 'success');
  } catch {
    // fallback to AI log path
    const input = `${item}`;
    await sendToAPI(input, null);
  }
}

// ── Pills ─────────────────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toLocaleDateString('sv-SE', { timeZone: TZ });
}

function renderPills() {
  const today     = todayStr();
  const todayFood = allFood.filter(e => e.logged_at.startsWith(today));
  const totalCal  = todayFood.reduce((s,e) => s + (e.calories||0), 0);
  const totalProt = todayFood.reduce((s,e) => s + parseFloat(e.protein||0), 0);
  const remCal    = GOALS.calories - totalCal;
  const remProt   = GOALS.protein  - totalProt;

  const calClass = remCal >= 0 ? (remCal < 300 ? 'amber' : 'green') : 'red';
  const calLabel = remCal >= 0 ? `${remCal} kcal left` : `${Math.abs(remCal)} over`;
  const protClass = remProt <= 0 ? 'green' : 'amber';
  const protLabel = remProt <= 0 ? `protein ✓` : `${remProt.toFixed(0)}g protein left`;

  const startMs  = new Date(WEIGHT_START.date).getTime();
  const endMs    = new Date(WEIGHT_TARGET.date).getTime();
  const nowMs    = Date.now();
  const progress = Math.min(1, Math.max(0, (nowMs - startMs) / (endMs - startMs)));
  const targetKg = WEIGHT_START.kg + (WEIGHT_TARGET.kg - WEIGHT_START.kg) * progress;
  const latest   = allWeight[0];
  let wClass, wLabel;
  if (latest) {
    const diff = (parseFloat(latest.weight) - targetKg).toFixed(1);
    wClass = parseFloat(latest.weight) <= targetKg ? 'green' : 'amber';
    const sign = diff > 0 ? '+' : '';
    wLabel = `${latest.weight}kg (${sign}${diff})`;
  } else {
    wClass = 'neutral';
    wLabel = 'no weight logged';
  }

  const pill = (cls, label, key) =>
    `<div class="pill ${cls}" onclick="openTargetsModal('${key}')" title="Edit targets"><span class="dot"></span><span>${label}</span></div>`;

  document.getElementById('pills-row').innerHTML =
    pill(calClass, calLabel, 'cal') +
    pill(protClass, protLabel, 'prot') +
    pill(wClass, wLabel, 'weight');
}

// ── List ──────────────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('toggle-food').classList.toggle('active', v === 'food');
  document.getElementById('toggle-weight').classList.toggle('active', v === 'weight');
  document.getElementById('manual-btn').textContent = '';
  document.getElementById('manual-btn').innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg> Add manually`;
  renderList();
}

function formatTime(iso) {
  return new Date(iso).toLocaleTimeString('en-GB', { timeZone: TZ, hour:'2-digit', minute:'2-digit' });
}
function formatDate(dateStr) {
  const today = todayStr();
  const yest  = new Date(Date.now()-86400000).toLocaleDateString('sv-SE',{timeZone:TZ});
  if (dateStr === today) return 'Today';
  if (dateStr === yest)  return 'Yesterday';
  return new Date(dateStr+'T12:00:00').toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
}

function renderList() {
  const el = document.getElementById('log-list');
  currentView === 'weight' ? renderWeightList(el) : renderFoodList(el);
}

function renderFoodList(el) {
  if (!allFood.length) {
    el.innerHTML = `<div class="empty-state"><p>Nothing logged yet</p><span>Type what you ate, take a photo,<br>or use voice input above.</span></div>`;
    return;
  }
  const groups = {};
  allFood.forEach(e => { const d = e.logged_at.slice(0,10); if(!groups[d]) groups[d]=[]; groups[d].push(e); });
  const days = Object.keys(groups).sort().reverse();
  let html = '';
  days.forEach(day => {
    const entries  = groups[day];
    const dayCal   = entries.reduce((s,e)=>s+(e.calories||0),0);
    const dayProt  = entries.reduce((s,e)=>s+parseFloat(e.protein||0),0);
    const calClass = dayCal <= GOALS.calories ? 'green' : 'red';
    const proClass = dayProt >= GOALS.protein  ? 'green' : 'amber';
    html += `<div class="day-group"><div class="day-header"><span class="day-label">${formatDate(day)}</span><div class="day-totals"><span class="day-pill ${calClass}">${dayCal} kcal</span><span class="day-pill ${proClass}">${dayProt.toFixed(0)}g</span></div></div>`;
    entries.forEach(e => {
      html += `<div class="entry" onclick="openEditFood('${e.id}')">
        <div class="entry-icon">🍽</div>
        <div class="entry-body"><div class="entry-name">${escHtml(e.item)}</div><div class="entry-meta">${formatTime(e.logged_at)}</div></div>
        <div class="entry-macros"><div class="entry-cal">${e.calories}</div><div class="entry-prot">${parseFloat(e.protein).toFixed(0)}g</div></div>
        <button class="entry-relog" onclick="event.stopPropagation();quickAdd(${JSON.stringify(e.item)},${e.calories},${parseFloat(e.protein).toFixed(1)})" title="Log again">+</button>
      </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
}

function renderWeightList(el) {
  if (!allWeight.length) {
    el.innerHTML = `<div class="empty-state"><p>No weight entries</p><span>Log your weight by typing<br>"75.2kg" or similar.</span></div>`;
    return;
  }
  const groups = {};
  allWeight.forEach(e => { const d = e.logged_at.slice(0,10); if(!groups[d]) groups[d]=[]; groups[d].push(e); });
  const startMs = new Date(WEIGHT_START.date).getTime();
  const endMs   = new Date(WEIGHT_TARGET.date).getTime();
  const days = Object.keys(groups).sort().reverse();
  let html = '';
  days.forEach(day => {
    const entries  = groups[day];
    const latest   = entries[0];
    const dayMs    = new Date(day+'T12:00:00').getTime();
    const prog     = Math.min(1,Math.max(0,(dayMs-startMs)/(endMs-startMs)));
    const targetKg = WEIGHT_START.kg + (WEIGHT_TARGET.kg - WEIGHT_START.kg) * prog;
    const onTrack  = parseFloat(latest.weight) <= targetKg;
    html += `<div class="day-group"><div class="day-header"><span class="day-label">${formatDate(day)}</span><div class="day-totals"><span class="day-pill ${onTrack?'green':'amber'}">${onTrack?'on track':'above target'}</span></div></div>`;
    entries.forEach(e => {
      html += `<div class="entry" onclick="openEditWeight('${e.id}')">
        <div class="entry-icon">⚖️</div>
        <div class="entry-body"><div class="entry-name">${e.weight} kg</div><div class="entry-meta">${formatTime(e.logged_at)}</div></div>
        <div class="entry-macros"><div class="entry-cal" style="font-size:12px;color:var(--muted)">target ${targetKg.toFixed(1)}</div></div>
      </div>`;
    });
    html += `</div>`;
  });
  el.innerHTML = html;
}

// ── Send (AI path) ────────────────────────────────────────────────────────────
async function handleSend() {
  const input = document.getElementById('text-input').value.trim();
  if (!input && !pendingPhoto) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="border-color:rgba(255,255,255,0.2);border-top-color:white;width:14px;height:14px;"></div>`;
  try {
    await sendToAPI(input, pendingPhoto);
    document.getElementById('text-input').value = '';
    clearPhoto();
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;
  }
}

async function sendToAPI(input, photo) {
  const body = { input, clientTime: new Date().toISOString(), clientTz: TZ };
  if (photo) { body.image = photo.base64; body.imageType = photo.type; }
  const res  = await fetch(`${API_BASE}/log`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const json = await res.json();
  if (!res.ok) throw new Error(json.error || 'Server error');

  if (json.type === 'weight') {
    allWeight = [...json.items, ...allWeight];
    allWeight.sort((a,b) => new Date(b.logged_at)-new Date(a.logged_at));
  } else {
    allFood = [...json.items, ...allFood];
    allFood.sort((a,b) => new Date(b.logged_at)-new Date(a.logged_at));
  }
  renderPills(); renderSuggestions(); renderList();

  const confirmText = json.type === 'weight'
    ? `Logged ${json.items[0].weight}kg`
    : `${json.items.map(i=>i.item).join(', ')} · ${json.items.reduce((s,i)=>s+i.calories,0)} kcal`;
  showToast(`✓ ${confirmText}`, 'success');

  const assumptions = json.items.map(i=>i.assumptions).filter(Boolean).join('; ');
  if (assumptions) setTimeout(() => showToast(`Assumed: ${assumptions}`, 'neutral', 4000), 3200);
}

document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); }
});

// ── Photo ─────────────────────────────────────────────────────────────────────
function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    pendingPhoto = { base64: reader.result.split(',')[1], type: file.type, name: file.name };
    document.getElementById('photo-name').textContent = file.name.length > 16 ? file.name.slice(0,14)+'…' : file.name;
    document.getElementById('photo-chip').style.display = 'flex';
  };
  reader.readAsDataURL(file);
}
function clearPhoto() {
  pendingPhoto = null;
  document.getElementById('photo-chip').style.display = 'none';
  document.getElementById('file-input').value = '';
}

// ── Speech ────────────────────────────────────────────────────────────────────
function toggleSpeech() { isRecording ? stopSpeech() : startSpeech(); }
function startSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Use keyboard dictation for voice input', 'error'); return; }
  speechRecognition = new SR();
  speechRecognition.continuous = false;
  speechRecognition.interimResults = false;
  speechRecognition.lang = 'en-US';
  speechRecognition.onresult = e => {
    const t = e.results[0][0].transcript;
    const ta = document.getElementById('text-input');
    ta.value = ta.value ? ta.value + ' ' + t : t;
    stopSpeech();
  };
  speechRecognition.onerror = stopSpeech;
  speechRecognition.onend   = stopSpeech;
  speechRecognition.start();
  isRecording = true;
  document.getElementById('mic-btn').classList.add('recording');
}
function stopSpeech() {
  try { speechRecognition && speechRecognition.stop(); } catch(e) {}
  speechRecognition = null; isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
}

// ── Manual add modal ──────────────────────────────────────────────────────────
function openManualModal() {
  manualTab = currentView === 'weight' ? 'weight' : 'food';
  renderManualFields();
  document.getElementById('manual-modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeManualModal(e) {
  if (e && e.target !== document.getElementById('manual-modal-backdrop')) return;
  document.getElementById('manual-modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function setManualTab(tab) {
  manualTab = tab;
  document.getElementById('manual-tab-food').classList.toggle('active', tab === 'food');
  document.getElementById('manual-tab-weight').classList.toggle('active', tab === 'weight');
  renderManualFields();
}
function nowLocalISO() {
  const now = new Date();
  const off = now.getTimezoneOffset();
  return new Date(now.getTime() - off * 60000).toISOString().slice(0, 16);
}
function renderManualFields() {
  const el = document.getElementById('manual-fields');
  if (manualTab === 'food') {
    el.innerHTML = `
      <div class="field-group"><label>Food item</label><input id="mf-item" placeholder="e.g. Chicken breast 150g"></div>
      <div class="field-group"><label>Calories</label><input id="mf-cal" type="number" placeholder="350"></div>
      <div class="field-group"><label>Protein (g)</label><input id="mf-prot" type="number" step="0.1" placeholder="30"></div>
      <div class="field-group"><label>Time</label><input id="mf-time" type="datetime-local" value="${nowLocalISO()}"></div>`;
  } else {
    el.innerHTML = `
      <div class="field-group"><label>Weight (kg)</label><input id="mf-weight" type="number" step="0.1" placeholder="74.5"></div>
      <div class="field-group"><label>Time</label><input id="mf-time" type="datetime-local" value="${nowLocalISO()}"></div>`;
  }
}
async function saveManual() {
  const timeVal = document.getElementById('mf-time').value;
  const logged_at = timeVal ? new Date(timeVal).toISOString() : new Date().toISOString();

  try {
    if (manualTab === 'food') {
      const item     = document.getElementById('mf-item').value.trim();
      const calories = parseInt(document.getElementById('mf-cal').value);
      const protein  = parseFloat(document.getElementById('mf-prot').value);
      if (!item || isNaN(calories) || isNaN(protein)) { showToast('Fill in all fields', 'error'); return; }
      const res  = await fetch(`${API_BASE}/entry?table=food_log`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({item, calories, protein, logged_at}) });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error);
      allFood = [json.data, ...allFood];
      allFood.sort((a,b) => new Date(b.logged_at)-new Date(a.logged_at));
      showToast(`✓ ${item} · ${calories} kcal`, 'success');
    } else {
      const weight = parseFloat(document.getElementById('mf-weight').value);
      if (isNaN(weight)) { showToast('Enter a valid weight', 'error'); return; }
      const res  = await fetch(`${API_BASE}/entry?table=weight_log`, { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({weight, logged_at}) });
      const json = await res.json();
      if (!res.ok) throw new Error(json.error);
      allWeight = [json.data, ...allWeight];
      allWeight.sort((a,b) => new Date(b.logged_at)-new Date(a.logged_at));
      showToast(`✓ ${weight}kg logged`, 'success');
    }
    renderPills(); renderSuggestions(); renderList();
    closeManualModal();
  } catch(e) {
    showToast(`Error: ${e.message}`, 'error');
  }
}

// ── Edit modal ────────────────────────────────────────────────────────────────
function openEditFood(id) {
  editingEntry = allFood.find(e => e.id === id); if (!editingEntry) return;
  editingTable = 'food_log';
  document.getElementById('edit-modal-title').textContent = 'Edit food entry';
  const t = new Date(editingEntry.logged_at).toISOString().slice(0,16);
  document.getElementById('edit-modal-fields').innerHTML = `
    <div class="field-group"><label>Food item</label><input id="ef-item" value="${escHtml(editingEntry.item)}"></div>
    <div class="field-group"><label>Calories</label><input id="ef-cal" type="number" value="${editingEntry.calories}"></div>
    <div class="field-group"><label>Protein (g)</label><input id="ef-prot" type="number" step="0.1" value="${parseFloat(editingEntry.protein).toFixed(1)}"></div>
    <div class="field-group"><label>Time</label><input id="ef-time" type="datetime-local" value="${t}"></div>`;
  document.getElementById('edit-modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function openEditWeight(id) {
  editingEntry = allWeight.find(e => e.id === id); if (!editingEntry) return;
  editingTable = 'weight_log';
  document.getElementById('edit-modal-title').textContent = 'Edit weight entry';
  const t = new Date(editingEntry.logged_at).toISOString().slice(0,16);
  document.getElementById('edit-modal-fields').innerHTML = `
    <div class="field-group"><label>Weight (kg)</label><input id="ef-weight" type="number" step="0.1" value="${editingEntry.weight}"></div>
    <div class="field-group"><label>Time</label><input id="ef-time" type="datetime-local" value="${t}"></div>`;
  document.getElementById('edit-modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeEditModal(e) {
  if (e && e.target !== document.getElementById('edit-modal-backdrop')) return;
  document.getElementById('edit-modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  editingEntry = null; editingTable = null;
}
async function saveEntry() {
  if (!editingEntry) return;
  const logged_at = new Date(document.getElementById('ef-time').value).toISOString();
  let updates = { logged_at };
  if (editingTable === 'food_log') {
    updates.item     = document.getElementById('ef-item').value.trim();
    updates.calories = parseInt(document.getElementById('ef-cal').value);
    updates.protein  = parseFloat(document.getElementById('ef-prot').value);
  } else {
    updates.weight = parseFloat(document.getElementById('ef-weight').value);
  }
  try {
    const res  = await fetch(`${API_BASE}/entry?id=${editingEntry.id}&table=${editingTable}`, { method:'PUT', headers:{'Content-Type':'application/json'}, body: JSON.stringify(updates) });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error);
    if (editingTable === 'food_log') allFood   = allFood.map(e   => e.id === editingEntry.id ? json.data : e);
    else                             allWeight = allWeight.map(e => e.id === editingEntry.id ? json.data : e);
    renderPills(); renderSuggestions(); renderList();
    closeEditModal(); showToast('✓ Entry updated', 'success');
  } catch(e) { showToast(`Error: ${e.message}`, 'error'); }
}
async function deleteEntry() {
  if (!editingEntry || !confirm('Delete this entry?')) return;
  try {
    const res = await fetch(`${API_BASE}/entry?id=${editingEntry.id}&table=${editingTable}`, { method:'DELETE' });
    if (!res.ok) throw new Error('Delete failed');
    if (editingTable === 'food_log') allFood   = allFood.filter(e   => e.id !== editingEntry.id);
    else                             allWeight = allWeight.filter(e => e.id !== editingEntry.id);
    renderPills(); renderSuggestions(); renderList();
    closeEditModal(); showToast('Entry deleted', 'neutral');
  } catch(e) { showToast(`Error: ${e.message}`, 'error'); }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'neutral', duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, duration);
}

function escHtml(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Targets modal ─────────────────────────────────────────────────────────────
function openTargetsModal(focus) {
  document.getElementById('tgt-cal').value         = GOALS.calories;
  document.getElementById('tgt-prot').value        = GOALS.protein;
  document.getElementById('tgt-wstart').value      = WEIGHT_START.kg;
  document.getElementById('tgt-wstart-date').value = WEIGHT_START.date;
  document.getElementById('tgt-wtarget').value     = WEIGHT_TARGET.kg;
  document.getElementById('tgt-wtarget-date').value= WEIGHT_TARGET.date;
  document.getElementById('targets-modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
  // focus the relevant field
  const map = { cal: 'tgt-cal', prot: 'tgt-prot', weight: 'tgt-wtarget' };
  if (map[focus]) setTimeout(() => document.getElementById(map[focus]).focus(), 250);
}
function closeTargetsModal(e) {
  if (e && e.target !== document.getElementById('targets-modal-backdrop')) return;
  document.getElementById('targets-modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
}
function saveTargets() {
  const cal   = parseInt(document.getElementById('tgt-cal').value);
  const prot  = parseFloat(document.getElementById('tgt-prot').value);
  const wsk   = parseFloat(document.getElementById('tgt-wstart').value);
  const wsd   = document.getElementById('tgt-wstart-date').value;
  const wtk   = parseFloat(document.getElementById('tgt-wtarget').value);
  const wtd   = document.getElementById('tgt-wtarget-date').value;
  if ([cal, prot, wsk, wtk].some(isNaN) || !wsd || !wtd) {
    showToast('Fill in all fields', 'error'); return;
  }
  GOALS         = { calories: cal, protein: prot };
  WEIGHT_START  = { kg: wsk, date: wsd };
  WEIGHT_TARGET = { kg: wtk, date: wtd };
  saveTargetsToStorage({ goals: GOALS, weightStart: WEIGHT_START, weightTarget: WEIGHT_TARGET });
  renderPills();
  document.getElementById('targets-modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  showToast('✓ Targets saved', 'success');
}
</script>
