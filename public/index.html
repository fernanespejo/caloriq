<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>caloriq</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Sans:wght@300;400;500&display=swap');

  :root {
    --bg:        #F5F3EE;
    --surface:   #EDEAE3;
    --border:    #D9D5CC;
    --text:      #1A1915;
    --muted:     #7A7670;
    --accent:    #C96442;
    --accent-lt: #F2E8E3;
    --green:     #2D6A4F;
    --green-lt:  #D8EFDE;
    --amber:     #A05C00;
    --amber-lt:  #FEF0D6;
    --red:       #B83232;
    --red-lt:    #FAE0E0;
    --radius:    14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    max-width: 540px;
    margin: 0 auto;
  }

  /* ── Header ─────────────────────────── */
  header {
    padding: 18px 20px 10px;
    display: flex;
    align-items: baseline;
    gap: 8px;
  }
  header h1 {
    font-family: 'Lora', serif;
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.3px;
  }
  header span {
    font-size: 12px;
    color: var(--muted);
  }

  /* ── Input card ─────────────────────── */
  .input-card {
    margin: 0 16px;
    background: white;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  textarea {
    width: 100%;
    border: none;
    outline: none;
    resize: none;
    padding: 14px 16px 10px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    line-height: 1.5;
    background: transparent;
    color: var(--text);
    min-height: 72px;
  }
  textarea::placeholder { color: var(--muted); }

  .input-actions {
    display: flex;
    align-items: center;
    padding: 8px 10px 10px;
    gap: 6px;
    border-top: 1px solid var(--surface);
  }

  .icon-btn {
    width: 36px; height: 36px;
    border: none;
    background: var(--surface);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: var(--muted);
    transition: background 0.15s, color 0.15s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .icon-btn:active { background: var(--border); }
  .icon-btn.recording { background: var(--red-lt); color: var(--red); animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }

  .icon-btn svg { width: 17px; height: 17px; }

  #file-input { display: none; }

  .send-btn {
    margin-left: auto;
    width: 36px; height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    color: white;
    transition: opacity 0.15s, transform 0.1s;
    -webkit-tap-highlight-color: transparent;
    flex-shrink: 0;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; }
  .send-btn svg { width: 16px; height: 16px; }

  /* ── Status pills row ───────────────── */
  .pills-row {
    display: flex;
    gap: 8px;
    padding: 12px 16px 4px;
    flex-wrap: wrap;
  }

  .pill {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 5px 11px;
    border-radius: 20px;
    font-size: 12.5px;
    font-weight: 500;
    line-height: 1;
    white-space: nowrap;
  }
  .pill .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }
  .pill.green  { background: var(--green-lt);  color: var(--green); }
  .pill.green .dot  { background: var(--green); }
  .pill.amber  { background: var(--amber-lt);  color: var(--amber); }
  .pill.amber .dot  { background: var(--amber); }
  .pill.red    { background: var(--red-lt);    color: var(--red); }
  .pill.red .dot    { background: var(--red); }
  .pill.neutral{ background: var(--surface);   color: var(--muted); }
  .pill.neutral .dot{ background: var(--border); }

  /* ── Toast ──────────────────────────── */
  #toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--text);
    color: white;
    padding: 10px 18px;
    border-radius: 20px;
    font-size: 13.5px;
    font-weight: 500;
    z-index: 100;
    transition: transform 0.25s ease;
    pointer-events: none;
    white-space: nowrap;
    max-width: calc(100vw - 48px);
    text-align: center;
  }
  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.success { background: var(--green); }
  #toast.error   { background: var(--red); }

  /* ── Toggle ─────────────────────────── */
  .toggle-row {
    display: flex;
    padding: 16px 16px 8px;
    gap: 6px;
  }
  .toggle-btn {
    padding: 6px 16px;
    border-radius: 20px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    transition: all 0.15s;
  }
  .toggle-btn.active {
    background: var(--text);
    border-color: var(--text);
    color: white;
  }

  /* ── Log list ───────────────────────── */
  .log-list {
    flex: 1;
    padding: 0 16px 100px;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .day-group { margin-bottom: 20px; }

  .day-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 8px 0 6px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 2px;
  }
  .day-label {
    font-family: 'Lora', serif;
    font-size: 13px;
    font-style: italic;
    color: var(--muted);
  }
  .day-totals {
    display: flex;
    gap: 6px;
    align-items: center;
  }
  .day-pill {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 10px;
  }
  .day-pill.green { background: var(--green-lt); color: var(--green); }
  .day-pill.red   { background: var(--red-lt);   color: var(--red); }
  .day-pill.amber { background: var(--amber-lt); color: var(--amber); }
  .day-pill.neutral{ background: var(--surface);  color: var(--muted); }

  /* ── Entry row ──────────────────────── */
  .entry {
    display: flex;
    align-items: flex-start;
    padding: 10px 0;
    border-bottom: 1px solid var(--surface);
    gap: 10px;
    -webkit-tap-highlight-color: transparent;
    cursor: pointer;
  }
  .entry:last-child { border-bottom: none; }
  .entry:active { opacity: 0.7; }

  .entry-icon {
    width: 30px; height: 30px;
    background: var(--surface);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    font-size: 14px;
    margin-top: 1px;
  }

  .entry-body { flex: 1; min-width: 0; }
  .entry-name {
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .entry-meta {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .entry-macros {
    text-align: right;
    flex-shrink: 0;
  }
  .entry-cal {
    font-size: 14px;
    font-weight: 500;
  }
  .entry-prot {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  /* ── Edit modal ─────────────────────── */
  .modal-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.4);
    z-index: 50;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .modal-backdrop.open {
    opacity: 1;
    pointer-events: all;
  }
  .modal {
    background: white;
    border-radius: var(--radius) var(--radius) 0 0;
    padding: 20px 20px 36px;
    width: 100%;
    max-width: 540px;
    transform: translateY(100%);
    transition: transform 0.25s ease;
    max-height: 90dvh;
    overflow-y: auto;
  }
  .modal-backdrop.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 18px;
  }
  .modal h3 {
    font-family: 'Lora', serif;
    font-size: 17px;
    margin-bottom: 16px;
  }
  .field-group { margin-bottom: 14px; }
  .field-group label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    margin-bottom: 5px;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .field-group input {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
    outline: none;
  }
  .field-group input:focus { border-color: var(--accent); }

  .modal-actions {
    display: flex;
    gap: 8px;
    margin-top: 20px;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border-radius: var(--radius-sm);
    border: none;
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .btn.primary { background: var(--accent); color: white; }
  .btn.secondary { background: var(--surface); color: var(--text); }
  .btn.danger { background: var(--red-lt); color: var(--red); }

  .loading-row {
    display: flex; align-items: center; gap: 8px;
    padding: 24px 0;
    color: var(--muted);
    font-size: 14px;
    justify-content: center;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  .empty-state {
    text-align: center;
    padding: 48px 16px;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.6;
  }
  .empty-state p:first-child {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--text);
    margin-bottom: 6px;
  }

  /* assumptions hint below entry in confirm */
  .assumptions-note {
    font-size: 12px;
    color: var(--muted);
    font-style: italic;
    margin-top: 4px;
    padding: 6px 10px;
    background: var(--surface);
    border-radius: 6px;
  }
</style>
</head>
<body>

<header>
  <h1>caloriq</h1>
  <span>food & weight log</span>
</header>

<!-- Input card -->
<div class="input-card">
  <textarea id="text-input" placeholder="What did you eat? or log your weight…" rows="3"></textarea>
  <div class="input-actions">
    <!-- Photo -->
    <button class="icon-btn" onclick="document.getElementById('file-input').click()" title="Attach photo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
        <circle cx="12" cy="13" r="4"/>
      </svg>
    </button>
    <input type="file" id="file-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">

    <!-- Mic -->
    <button class="icon-btn" id="mic-btn" onclick="toggleSpeech()" title="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
        <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
        <line x1="12" y1="19" x2="12" y2="23"/>
        <line x1="8" y1="23" x2="16" y2="23"/>
      </svg>
    </button>

    <!-- Photo preview chip -->
    <div id="photo-chip" style="display:none; align-items:center; gap:5px; background:var(--accent-lt); border-radius:8px; padding:4px 8px; font-size:12px; color:var(--accent);">
      <span>📷</span>
      <span id="photo-name"></span>
      <button onclick="clearPhoto()" style="border:none;background:none;cursor:pointer;color:var(--accent);font-size:14px;line-height:1;padding:0 0 0 2px;">×</button>
    </div>

    <button class="send-btn" id="send-btn" onclick="handleSend()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"/>
        <polyline points="5 12 12 5 19 12"/>
      </svg>
    </button>
  </div>
</div>

<!-- Status pills -->
<div class="pills-row" id="pills-row">
  <div class="pill neutral"><span class="dot"></span><span>loading…</span></div>
</div>

<!-- Toggle -->
<div class="toggle-row">
  <button class="toggle-btn active" id="toggle-food" onclick="setView('food')">Food</button>
  <button class="toggle-btn" id="toggle-weight" onclick="setView('weight')">Weight</button>
</div>

<!-- Log list -->
<div class="log-list" id="log-list">
  <div class="loading-row"><div class="spinner"></div><span>Loading entries…</span></div>
</div>

<!-- Edit modal -->
<div class="modal-backdrop" id="modal-backdrop" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title">Edit entry</h3>
    <div id="modal-fields"></div>
    <div class="modal-actions">
      <button class="btn danger" onclick="deleteEntry()">Delete</button>
      <button class="btn secondary" onclick="closeModal()">Cancel</button>
      <button class="btn primary" onclick="saveEntry()">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
// ── Config ───────────────────────────────────────────────────────────────────
const API_BASE = '/api';
const GOALS = { calories: 1500, protein: 120 };
const WEIGHT_START = { kg: 75.9, date: '2026-05-31' };
const WEIGHT_TARGET = { kg: 66, date: '2026-08-29' };
const TZ = 'Europe/Tallinn';

// ── State ────────────────────────────────────────────────────────────────────
let currentView = 'food';
let allFood = [];
let allWeight = [];
let pendingPhoto = null;
let speechRecognition = null;
let isRecording = false;
let editingEntry = null;
let editingTable = null;

// ── Init ─────────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  loadData();
});

async function loadData() {
  try {
    const [foodRes, weightRes] = await Promise.all([
      fetch(`${API_BASE}/log?type=food`),
      fetch(`${API_BASE}/log?type=weight`)
    ]);
    const foodJson = await foodRes.json();
    const weightJson = await weightRes.json();
    allFood = foodJson.data || [];
    allWeight = weightJson.data || [];
    renderPills();
    renderList();
  } catch (e) {
    document.getElementById('log-list').innerHTML = `<div class="empty-state"><p>Couldn't load</p><span>${e.message}</span></div>`;
  }
}

// ── Pills ────────────────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toLocaleDateString('sv-SE', { timeZone: TZ }); // YYYY-MM-DD
}

function renderPills() {
  const today = todayStr();
  const todayFood = allFood.filter(e => e.logged_at.startsWith(today));
  const totalCal  = todayFood.reduce((s, e) => s + (e.calories || 0), 0);
  const totalProt = todayFood.reduce((s, e) => s + parseFloat(e.protein || 0), 0);
  const remCal    = GOALS.calories - totalCal;
  const remProt   = GOALS.protein  - totalProt;

  // Calorie pill
  let calClass = remCal >= 0 ? (remCal < 300 ? 'amber' : 'green') : 'red';
  let calLabel  = remCal >= 0 ? `${remCal} kcal left` : `${Math.abs(remCal)} kcal over`;

  // Protein pill
  let protClass = remProt <= 0 ? 'green' : (remProt < 30 ? 'amber' : 'amber');
  let protLabel  = remProt <= 0 ? `protein ✓` : `${remProt.toFixed(0)}g protein left`;

  // Weight pill — linear interpolation target for today
  const startMs  = new Date(WEIGHT_START.date).getTime();
  const endMs    = new Date(WEIGHT_TARGET.date).getTime();
  const nowMs    = new Date().getTime();
  const progress = Math.min(1, Math.max(0, (nowMs - startMs) / (endMs - startMs)));
  const targetKg = WEIGHT_START.kg + (WEIGHT_TARGET.kg - WEIGHT_START.kg) * progress;
  const latest   = allWeight[0];
  let wPill;
  if (latest) {
    const diff = (parseFloat(latest.weight) - targetKg).toFixed(1);
    const wClass = parseFloat(latest.weight) <= targetKg ? 'green' : 'amber';
    const sign   = diff > 0 ? '+' : '';
    wPill = `<div class="pill ${wClass}"><span class="dot"></span><span>${latest.weight}kg (${sign}${diff} vs target)</span></div>`;
  } else {
    wPill = `<div class="pill neutral"><span class="dot"></span><span>no weight logged</span></div>`;
  }

  document.getElementById('pills-row').innerHTML = `
    <div class="pill ${calClass}"><span class="dot"></span><span>${calLabel}</span></div>
    <div class="pill ${protClass}"><span class="dot"></span><span>${protLabel}</span></div>
    ${wPill}
  `;
}

// ── List rendering ────────────────────────────────────────────────────────────
function setView(v) {
  currentView = v;
  document.getElementById('toggle-food').classList.toggle('active', v === 'food');
  document.getElementById('toggle-weight').classList.toggle('active', v === 'weight');
  renderList();
}

function renderList() {
  const el = document.getElementById('log-list');
  if (currentView === 'weight') {
    renderWeightList(el);
  } else {
    renderFoodList(el);
  }
}

function formatTime(isoStr) {
  return new Date(isoStr).toLocaleTimeString('en-GB', {
    timeZone: TZ, hour: '2-digit', minute: '2-digit'
  });
}
function formatDate(dateStr) {
  const d = new Date(dateStr + 'T12:00:00');
  const today = todayStr();
  const yesterday = new Date(Date.now() - 86400000).toLocaleDateString('sv-SE', { timeZone: TZ });
  if (dateStr === today) return 'Today';
  if (dateStr === yesterday) return 'Yesterday';
  return d.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short' });
}

function renderFoodList(el) {
  if (!allFood.length) {
    el.innerHTML = `<div class="empty-state"><p>Nothing logged yet</p><span>Type what you ate, take a photo,<br>or use voice input above.</span></div>`;
    return;
  }

  // Group by day
  const groups = {};
  allFood.forEach(e => {
    const day = e.logged_at.slice(0, 10);
    if (!groups[day]) groups[day] = [];
    groups[day].push(e);
  });

  const sortedDays = Object.keys(groups).sort().reverse();
  let html = '';

  sortedDays.forEach(day => {
    const entries = groups[day];
    const dayCal  = entries.reduce((s, e) => s + (e.calories || 0), 0);
    const dayProt = entries.reduce((s, e) => s + parseFloat(e.protein || 0), 0);
    const calOk   = dayCal <= GOALS.calories;
    const protOk  = dayProt >= GOALS.protein;
    const calPillClass  = calOk ? 'green' : 'red';
    const protPillClass = protOk ? 'green' : 'amber';

    html += `<div class="day-group">
      <div class="day-header">
        <span class="day-label">${formatDate(day)}</span>
        <div class="day-totals">
          <span class="day-pill ${calPillClass}">${dayCal} kcal</span>
          <span class="day-pill ${protPillClass}">${dayProt.toFixed(0)}g</span>
        </div>
      </div>`;

    entries.forEach(e => {
      html += `<div class="entry" onclick="openEditFood('${e.id}')">
        <div class="entry-icon">🍽</div>
        <div class="entry-body">
          <div class="entry-name">${escHtml(e.item)}</div>
          <div class="entry-meta">${formatTime(e.logged_at)}</div>
        </div>
        <div class="entry-macros">
          <div class="entry-cal">${e.calories}</div>
          <div class="entry-prot">${parseFloat(e.protein).toFixed(0)}g</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html;
}

function renderWeightList(el) {
  if (!allWeight.length) {
    el.innerHTML = `<div class="empty-state"><p>No weight entries</p><span>Log your weight by typing<br>"75.2kg" or similar.</span></div>`;
    return;
  }

  // Group by day
  const groups = {};
  allWeight.forEach(e => {
    const day = e.logged_at.slice(0, 10);
    if (!groups[day]) groups[day] = [];
    groups[day].push(e);
  });

  const startMs = new Date(WEIGHT_START.date).getTime();
  const endMs   = new Date(WEIGHT_TARGET.date).getTime();

  const sortedDays = Object.keys(groups).sort().reverse();
  let html = '';

  sortedDays.forEach(day => {
    const entries = groups[day];
    const latestEntry = entries[0];
    const dayMs = new Date(day + 'T12:00:00').getTime();
    const prog  = Math.min(1, Math.max(0, (dayMs - startMs) / (endMs - startMs)));
    const targetKg = WEIGHT_START.kg + (WEIGHT_TARGET.kg - WEIGHT_START.kg) * prog;
    const onTrack  = parseFloat(latestEntry.weight) <= targetKg;
    const pillClass = onTrack ? 'green' : 'amber';

    html += `<div class="day-group">
      <div class="day-header">
        <span class="day-label">${formatDate(day)}</span>
        <div class="day-totals">
          <span class="day-pill ${pillClass}">${onTrack ? 'on track' : 'above target'}</span>
        </div>
      </div>`;

    entries.forEach(e => {
      html += `<div class="entry" onclick="openEditWeight('${e.id}')">
        <div class="entry-icon">⚖️</div>
        <div class="entry-body">
          <div class="entry-name">${e.weight} kg</div>
          <div class="entry-meta">${formatTime(e.logged_at)}</div>
        </div>
        <div class="entry-macros">
          <div class="entry-cal" style="font-size:12px;color:var(--muted)">target ${targetKg.toFixed(1)}kg</div>
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  el.innerHTML = html;
}

// ── Send ─────────────────────────────────────────────────────────────────────
async function handleSend() {
  const input = document.getElementById('text-input').value.trim();
  if (!input && !pendingPhoto) return;

  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  btn.innerHTML = `<div class="spinner" style="border-color:rgba(255,255,255,0.3);border-top-color:white;width:14px;height:14px;"></div>`;

  try {
    const body = { input };
    if (pendingPhoto) {
      body.image = pendingPhoto.base64;
      body.imageType = pendingPhoto.type;
    }

    const res = await fetch(`${API_BASE}/log`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    const json = await res.json();
    if (!res.ok) throw new Error(json.error || 'Server error');

    // Optimistically update local state
    if (json.type === 'weight') {
      allWeight = [...json.items, ...allWeight];
      allWeight.sort((a, b) => new Date(b.logged_at) - new Date(a.logged_at));
    } else {
      allFood = [...json.items, ...allFood];
      allFood.sort((a, b) => new Date(b.logged_at) - new Date(a.logged_at));
    }

    renderPills();
    renderList();

    // Build a readable confirmation
    let confirmText;
    if (json.type === 'weight') {
      confirmText = `Logged ${json.items[0].weight}kg`;
    } else {
      const names = json.items.map(i => i.item).join(', ');
      const totalCal = json.items.reduce((s, i) => s + i.calories, 0);
      confirmText = `Logged: ${names} · ${totalCal} kcal`;
    }

    // Show assumptions if present
    const assumptions = json.items.map(i => i.assumptions).filter(Boolean).join('; ');
    if (assumptions) {
      showToast(`✓ ${confirmText}`, 'success', 4000);
      setTimeout(() => showToast(`Assumed: ${assumptions}`, 'neutral', 4000), 200);
    } else {
      showToast(`✓ ${confirmText}`, 'success');
    }

    document.getElementById('text-input').value = '';
    clearPhoto();

  } catch (e) {
    showToast(`Error: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`;
  }
}

// Enter to send (desktop convenience)
document.getElementById('text-input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    handleSend();
  }
});

// ── Photo ────────────────────────────────────────────────────────────────────
function handlePhoto(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    const base64 = reader.result.split(',')[1];
    pendingPhoto = { base64, type: file.type, name: file.name };
    const chip = document.getElementById('photo-chip');
    document.getElementById('photo-name').textContent = file.name.length > 16 ? file.name.slice(0, 14) + '…' : file.name;
    chip.style.display = 'flex';
  };
  reader.readAsDataURL(file);
}
function clearPhoto() {
  pendingPhoto = null;
  document.getElementById('photo-chip').style.display = 'none';
  document.getElementById('file-input').value = '';
}

// ── Speech ───────────────────────────────────────────────────────────────────
function toggleSpeech() {
  if (isRecording) {
    stopSpeech();
  } else {
    startSpeech();
  }
}

function startSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    showToast('Voice not supported in this browser — use keyboard dictation', 'error');
    return;
  }
  speechRecognition = new SR();
  speechRecognition.continuous = false;
  speechRecognition.interimResults = false;
  speechRecognition.lang = 'en-US';

  speechRecognition.onresult = (e) => {
    const transcript = e.results[0][0].transcript;
    const ta = document.getElementById('text-input');
    ta.value = ta.value ? ta.value + ' ' + transcript : transcript;
    stopSpeech();
  };
  speechRecognition.onerror = () => stopSpeech();
  speechRecognition.onend   = () => stopSpeech();

  speechRecognition.start();
  isRecording = true;
  document.getElementById('mic-btn').classList.add('recording');
}

function stopSpeech() {
  if (speechRecognition) {
    try { speechRecognition.stop(); } catch(e) {}
    speechRecognition = null;
  }
  isRecording = false;
  document.getElementById('mic-btn').classList.remove('recording');
}

// ── Edit modal ────────────────────────────────────────────────────────────────
function openEditFood(id) {
  const entry = allFood.find(e => e.id === id);
  if (!entry) return;
  editingEntry = entry;
  editingTable = 'food_log';
  document.getElementById('modal-title').textContent = 'Edit food entry';

  const loggedAt = new Date(entry.logged_at).toISOString().slice(0, 16);
  document.getElementById('modal-fields').innerHTML = `
    <div class="field-group"><label>Food item</label><input id="ef-item" value="${escHtml(entry.item)}"></div>
    <div class="field-group"><label>Calories</label><input id="ef-cal" type="number" value="${entry.calories}"></div>
    <div class="field-group"><label>Protein (g)</label><input id="ef-prot" type="number" step="0.1" value="${parseFloat(entry.protein).toFixed(1)}"></div>
    <div class="field-group"><label>Time</label><input id="ef-time" type="datetime-local" value="${loggedAt}"></div>
  `;
  openModal();
}

function openEditWeight(id) {
  const entry = allWeight.find(e => e.id === id);
  if (!entry) return;
  editingEntry = entry;
  editingTable = 'weight_log';
  document.getElementById('modal-title').textContent = 'Edit weight entry';

  const loggedAt = new Date(entry.logged_at).toISOString().slice(0, 16);
  document.getElementById('modal-fields').innerHTML = `
    <div class="field-group"><label>Weight (kg)</label><input id="ef-weight" type="number" step="0.1" value="${entry.weight}"></div>
    <div class="field-group"><label>Time</label><input id="ef-time" type="datetime-local" value="${loggedAt}"></div>
  `;
  openModal();
}

function openModal() {
  document.getElementById('modal-backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-backdrop')) return;
  document.getElementById('modal-backdrop').classList.remove('open');
  document.body.style.overflow = '';
  editingEntry = null;
  editingTable = null;
}

async function saveEntry() {
  if (!editingEntry) return;
  let updates = {};
  const timeEl = document.getElementById('ef-time');
  if (timeEl) updates.logged_at = new Date(timeEl.value).toISOString();

  if (editingTable === 'food_log') {
    updates.item     = document.getElementById('ef-item').value.trim();
    updates.calories = parseInt(document.getElementById('ef-cal').value);
    updates.protein  = parseFloat(document.getElementById('ef-prot').value);
  } else {
    updates.weight = parseFloat(document.getElementById('ef-weight').value);
  }

  try {
    const res = await fetch(`${API_BASE}/entry?id=${editingEntry.id}&table=${editingTable}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    const json = await res.json();
    if (!res.ok) throw new Error(json.error);

    if (editingTable === 'food_log') {
      allFood = allFood.map(e => e.id === editingEntry.id ? json.data : e);
    } else {
      allWeight = allWeight.map(e => e.id === editingEntry.id ? json.data : e);
    }

    renderPills();
    renderList();
    closeModal();
    showToast('✓ Entry updated', 'success');
  } catch (e) {
    showToast(`Error: ${e.message}`, 'error');
  }
}

async function deleteEntry() {
  if (!editingEntry) return;
  if (!confirm('Delete this entry?')) return;

  try {
    const res = await fetch(`${API_BASE}/entry?id=${editingEntry.id}&table=${editingTable}`, {
      method: 'DELETE'
    });
    if (!res.ok) throw new Error('Delete failed');

    if (editingTable === 'food_log') {
      allFood = allFood.filter(e => e.id !== editingEntry.id);
    } else {
      allWeight = allWeight.filter(e => e.id !== editingEntry.id);
    }

    renderPills();
    renderList();
    closeModal();
    showToast('Entry deleted', 'neutral');
  } catch (e) {
    showToast(`Error: ${e.message}`, 'error');
  }
}

// ── Toast ─────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg, type = 'neutral', duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, duration);
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
